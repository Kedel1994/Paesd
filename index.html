<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salem DBS — Découverte Biblique et Spirituelle</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝</text></svg>"/>

<!-- React CDN -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<!-- Firebase CDN -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getDatabase, ref, set, get, push, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBjmJHuNe0GjblwBrP1Rakqr9HgZcfgYT8",
    authDomain: "salem-dbs.firebaseapp.com",
    databaseURL: "https://salem-dbs-default-rtdb.firebaseio.com",
    projectId: "salem-dbs",
    storageBucket: "salem-dbs.firebasestorage.app",
    messagingSenderId: "1018849656489",
    appId: "1:1018849656489:web:283f7174c426a7302373b8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  window._fb = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, ref, set, get, push, onValue };
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg:       #0E1117;
  --surface:  #161B26;
  --card:     #1C2333;
  --border:   #2A3348;
  --gold:     #D4A843;
  --gold-lt:  #F0CF89;
  --gold-dim: #8A6A20;
  --text:     #E8E2D5;
  --muted:    #8A95A8;
  --blue:     #4A7FA5;
  --purple:   #7A4A9A;
  --green:    #4A8A5A;
  --error:    #A04A3A;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.serif{font-family:'Cormorant Garamond',serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .35s ease}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.main{flex:1;overflow:auto;background:var(--bg);min-width:0}
.page{padding:24px 20px;max-width:860px;margin:0 auto}

/* Sidebar */
.sb-logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.sb-cross{width:36px;height:36px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-user{padding:14px 18px;border-bottom:1px solid var(--border);background:rgba(212,168,67,.04)}
.sb-nav{flex:1;padding:10px 8px}
.sb-section{font-size:10px;font-weight:600;letter-spacing:1.2px;color:#4A5568;padding:10px 10px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13.5px;color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:2px;border-left:2px solid transparent;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--gold);background:rgba(212,168,67,.1);border-left:2px solid var(--gold);font-weight:600}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sb-foot{padding:10px 8px;border-top:1px solid var(--border)}

/* Mobile header */
.mob-header{display:none;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
@media(max-width:768px){
  .sidebar{position:fixed;left:-230px;top:0;z-index:100;transition:left .25s}
  .sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .mob-header{display:flex}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
  .overlay.show{display:block}
}

/* Cards & UI */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-accent{border-top:3px solid var(--gold)}
.btn{padding:11px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px;font-family:'Inter',sans-serif}
.btn-gold{background:linear-gradient(135deg,var(--gold-dim),var(--gold));color:#0E1117}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--error);border-color:var(--error)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;font-family:'Inter',sans-serif}
.input:focus{border-color:var(--gold)}
.label{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.error-box{background:rgba(160,74,58,.15);border:1px solid rgba(160,74,58,.35);border-radius:8px;padding:11px 14px;font-size:13px;color:#E88A80;margin-bottom:14px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}

/* Tabs row */
.tabs{display:flex;background:var(--surface);border-radius:8px;padding:3px;gap:3px;margin-bottom:20px}
.tab{flex:1;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.tab.active{background:var(--gold);color:#0E1117}

/* Login page */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0E1117,#161B26 50%,#1A1530);padding:24px 16px}
.login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 28px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:28px}
.login-cross{display:inline-flex;width:50px;height:50px;background:linear-gradient(135deg,var(--gold-dim),var(--gold));border-radius:14px;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;box-shadow:0 4px 16px rgba(212,168,67,.25)}

/* Section pills */
.pill-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pill{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;transition:all .15s}

/* Quote block */
.quote{background:rgba(212,168,67,.06);border-left:3px solid var(--gold);border-radius:6px;padding:14px 16px;font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--gold-lt);line-height:1.75}

/* History item */
.hist-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .2s;margin-bottom:8px}
.hist-item:hover{border-color:var(--gold)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;border-top:3px solid}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr 1fr}}

/* Actions grid */
.actions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
@media(max-width:480px){.actions-grid{grid-template-columns:1fr}}
.action-btn{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;text-align:left;width:100%}
.action-btn:hover{background:#202838}
.action-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Section display */
.section-content{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:12px}
.meta-item label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px}
.meta-item p{font-size:13px;color:var(--text);line-height:1.5}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:480px){.meta-grid{grid-template-columns:1fr}}
.sub-section{margin-bottom:14px}
.sub-label{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.body-text{font-size:14px;line-height:1.8;color:#C8C0B0}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Wait for Firebase ──
function waitFB() {
  return new Promise(res => {
    const t = setInterval(() => { if(window._fb){ clearInterval(t); res(window._fb) } }, 50)
  })
}

// ══════════════════════════════════════════
// NAV CONFIG
// ══════════════════════════════════════════
const NAV = [
  { id:'dashboard',  icon:'⊞', label:'Tableau de bord' },
  { id:'etudes',     icon:'📖', label:'Études Bibliques' },
  { id:'pastoral',   icon:'🎙', label:'Module Pastoral' },
  { id:'formation',  icon:'🎓', label:'Formation' },
  { id:'historique', icon:'🕐', label:'Historique' },
  { id:'profil',     icon:'👤', label:'Mon Profil' },
]
const ADMIN_NAV = [
  { id:'eglises', icon:'⛪', label:'Églises' },
  { id:'membres', icon:'👥', label:'Membres' },
]

const SECTIONS = [
  { key:'texte',              label:'Texte biblique',        icon:'📜', color:'#D4A843' },
  { key:'contexteHistorique', label:'Contexte historique',   icon:'🏛', color:'#4A7FA5' },
  { key:'contexteLitteraire', label:'Contexte littéraire',   icon:'📚', color:'#7A4A9A' },
  { key:'analyseExegetique',  label:'Analyse exégétique',    icon:'🔍', color:'#4A8A5A' },
  { key:'analyseHermeneutique',label:'Analyse herméneutique',icon:'🔑', color:'#A07A3A' },
  { key:'analyseTheologique', label:'Analyse théologique',   icon:'✝', color:'#D4A843' },
  { key:'analysePentecotiste',label:'Analyse pentecôtiste',  icon:'🔥', color:'#A04A3A' },
  { key:'applicationPratique',label:'Application pratique',  icon:'🌱', color:'#4A8A5A' },
  { key:'referencesCroisees', label:'Références croisées',   icon:'🔗', color:'#4A7FA5' },
  { key:'questionsReflexion', label:'Questions de réflexion',icon:'💭', color:'#7A4A9A' },
  { key:'planEnseignement',   label:"Plan d'enseignement",   icon:'📋', color:'#8A6A20' },
]

// ══════════════════════════════════════════
// LOGIN PAGE
// ══════════════════════════════════════════
function LoginPage({ onLogin }) {
  const [tab, setTab] = useState('login')
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')
  const [form, setForm] = useState({ firstName:'', lastName:'', email:'', password:'', confirm:'' })
  const upd = k => e => setForm(f => ({...f, [k]: e.target.value}))

  async function submit() {
    setError(''); setLoading(true)
    const fb = await waitFB()
    try {
      if(tab === 'login') {
        const c = await fb.signInWithEmailAndPassword(fb.auth, form.email, form.password)
        const snap = await fb.get(fb.ref(fb.db, `users/${c.user.uid}`))
        onLogin(c.user, snap.exists() ? snap.val() : null)
      } else {
        if(!form.firstName||!form.lastName) throw {message:'Entrez nom et prénom'}
        if(form.password !== form.confirm) throw {message:'Mots de passe différents'}
        if(form.password.length < 6) throw {message:'Minimum 6 caractères'}
        const c = await fb.createUserWithEmailAndPassword(fb.auth, form.email, form.password)
        await fb.updateProfile(c.user, { displayName:`${form.firstName} ${form.lastName}` })
        const userData = { uid:c.user.uid, firstName:form.firstName, lastName:form.lastName, email:form.email, role:'USER', createdAt:new Date().toISOString() }
        await fb.set(fb.ref(fb.db, `users/${c.user.uid}`), userData)
        onLogin(c.user, userData)
      }
    } catch(e) {
      const msgs = { 'auth/user-not-found':'Compte introuvable','auth/wrong-password':'Mot de passe incorrect','auth/email-already-in-use':'Email déjà utilisé','auth/invalid-credential':'Email ou mot de passe incorrect' }
      setError(msgs[e.code] || e.message)
    } finally { setLoading(false) }
  }

  return (
    <div className="login-wrap fade">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-cross">✝</div>
          <div className="serif" style={{fontSize:26,fontWeight:700,color:'var(--gold-lt)'}}>Salem DBS</div>
          <div style={{fontSize:11,color:'var(--muted)',letterSpacing:'1.5px',textTransform:'uppercase',marginTop:4}}>Découverte Biblique & Spirituelle</div>
        </div>

        <div className="tabs">
          <button className={`tab${tab==='login'?' active':''}`} onClick={()=>{setTab('login');setError('')}}>Connexion</button>
          <button className={`tab${tab==='register'?' active':''}`} onClick={()=>{setTab('register');setError('')}}>Inscription</button>
        </div>

        {error && <div className="error-box">⚠ {error}</div>}

        {tab==='register' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
            <div><label className="label">Prénom</label><input className="input" placeholder="Jean" value={form.firstName} onChange={upd('firstName')} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
            <div><label className="label">Nom</label><input className="input" placeholder="Pierre" value={form.lastName} onChange={upd('lastName')} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
          </div>
        )}

        <div style={{marginBottom:14}}>
          <label className="label">Email</label>
          <input className="input" type="email" placeholder="nom@email.com" value={form.email} onChange={upd('email')} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        <div style={{marginBottom:tab==='register'?14:20}}>
          <label className="label">Mot de passe</label>
          <input className="input" type="password" placeholder="••••••••" value={form.password} onChange={upd('password')} onKeyDown={e=>e.key==='Enter'&&submit()}/>
        </div>
        {tab==='register' && (
          <div style={{marginBottom:20}}>
            <label className="label">Confirmer</label>
            <input className="input" type="password" placeholder="••••••••" value={form.confirm} onChange={upd('confirm')} onKeyDown={e=>e.key==='Enter'&&submit()}/>
          </div>
        )}

        <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',padding:13}} onClick={submit} disabled={loading}>
          {loading ? <><div className="spin"/>Patientez...</> : (tab==='login' ? '→ Se connecter' : '→ Créer mon compte')}
        </button>

        <div style={{textAlign:'center',marginTop:18,fontFamily:'Cormorant Garamond, serif',fontStyle:'italic',fontSize:14,color:'var(--gold)',opacity:.8}}>
          "Ta parole est une lampe à mes pieds" — Ps 119:105
        </div>
      </div>
    </div>
  )
}

// ══════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════
function Sidebar({ page, setPage, profile, onLogout, open, onClose }) {
  const isAdmin = profile?.role === 'SUPER_ADMIN' || profile?.role === 'CHURCH_ADMIN'
  const roleLabel = { SUPER_ADMIN:'⭐ Super Admin', CHURCH_ADMIN:'🏛 Admin Église', PASTOR:'✝ Pasteur', USER:'📖 Croyant' }

  function nav(id) { setPage(id); onClose() }

  return (
    <>
      {open && <div className="overlay show" onClick={onClose}/>}
      <aside className={`sidebar${open?' open':''}`}>
        <div className="sb-logo">
          <div className="sb-cross">✝</div>
          <div>
            <div className="serif" style={{fontSize:18,fontWeight:700,color:'var(--gold-lt)'}}>Salem DBS</div>
            <div style={{fontSize:10,color:'var(--muted)',letterSpacing:'1px'}}>DÉCOUVERTE BIBLIQUE</div>
          </div>
        </div>

        <div className="sb-user">
          <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{profile?.firstName} {profile?.lastName}</div>
          <div style={{fontSize:11,color:'var(--gold)',marginTop:3}}>{roleLabel[profile?.role]||'📖 Croyant'}</div>
        </div>

        <nav className="sb-nav">
          <div className="sb-section">Navigation</div>
          {NAV.map(n=>(
            <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>nav(n.id)}>
              <span className="nav-icon">{n.icon}</span>{n.label}
            </button>
          ))}
          {isAdmin && <>
            <div className="sb-section" style={{marginTop:8}}>Administration</div>
            {ADMIN_NAV.map(n=>(
              <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>nav(n.id)}>
                <span className="nav-icon">{n.icon}</span>{n.label}
              </button>
            ))}
          </>}
        </nav>

        <div className="sb-foot">
          <button className="nav-item btn-ghost" style={{width:'100%',border:'none'}} onClick={onLogout}>
            <span className="nav-icon">🚪</span>Déconnexion
          </button>
        </div>
      </aside>
    </>
  )
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
function Dashboard({ profile, setPage }) {
  const [studies, setStudies] = useState([])

  useEffect(()=>{
    if(!profile?.uid) return
    waitFB().then(fb=>{
      fb.get(fb.ref(fb.db, `studies/${profile.uid}`)).then(snap=>{
        if(snap.exists()) {
          const all = Object.values(snap.val()).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))
          setStudies(all)
        }
      }).catch(()=>{})
    })
  },[profile])

  const hour = new Date().getHours()
  const greet = hour<12?'Bonjour':hour<18?'Bon après-midi':'Bonsoir'

  const ACTIONS = [
    {icon:'📖',label:'Nouvelle étude',desc:'Analyser un passage',color:'#D4A843',page:'etudes'},
    {icon:'🎙',label:'Générer un sermon',desc:'Module pastoral',color:'#7A4A9A',page:'pastoral'},
    {icon:'🎓',label:'Formation',desc:'Parcours disciples',color:'#4A7FA5',page:'formation'},
    {icon:'🕐',label:'Historique',desc:'Études passées',color:'#4A8A5A',page:'historique'},
  ]

  return (
    <div className="page fade">
      <div style={{marginBottom:24}}>
        <h1 className="serif" style={{fontSize:28,fontWeight:700,color:'var(--gold-lt)',marginBottom:4}}>{greet}, {profile?.firstName} 👋</h1>
        <p style={{fontSize:13,color:'var(--muted)'}}>Que la Parole de Dieu éclaire votre journée</p>
      </div>

      <div className="stats-grid">
        {[
          {label:'Études réalisées',value:studies.length,icon:'📖',color:'#D4A843'},
          {label:'Cette semaine',value:studies.filter(s=>new Date(s.createdAt)>new Date(Date.now()-7*86400000)).length,icon:'📅',color:'#4A7FA5'},
          {label:'Rôle',value:profile?.role==='PASTOR'?'Pasteur':profile?.role==='SUPER_ADMIN'?'Admin':'Croyant',icon:'✝',color:'#7A4A9A'},
        ].map((s,i)=>(
          <div key={i} className="stat-card" style={{borderTopColor:s.color}}>
            <div style={{fontSize:20,marginBottom:6}}>{s.icon}</div>
            <div className="serif" style={{fontSize:24,fontWeight:700,color:s.color}}>{s.value}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{marginBottom:6,fontSize:11,fontWeight:600,letterSpacing:'1.2px',textTransform:'uppercase',color:'var(--muted)'}}>Actions rapides</div>
      <div className="actions-grid">
        {ACTIONS.map((a,i)=>(
          <button key={i} className="action-btn" onClick={()=>setPage(a.page)} onMouseEnter={e=>e.currentTarget.style.borderColor=a.color} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border)'}>
            <div className="action-icon" style={{background:`${a.color}22`}}>{a.icon}</div>
            <div>
              <div style={{fontSize:13,fontWeight:600,color:'var(--text)',marginBottom:2}}>{a.label}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{a.desc}</div>
            </div>
          </button>
        ))}
      </div>

      <div style={{marginBottom:10,fontSize:11,fontWeight:600,letterSpacing:'1.2px',textTransform:'uppercase',color:'var(--muted)'}}>Études récentes</div>
      {studies.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'32px 20px',color:'var(--muted)'}}>
          <div style={{fontSize:32,marginBottom:10}}>📖</div>
          <div style={{marginBottom:4}}>Aucune étude réalisée</div>
          <button className="btn btn-gold" style={{marginTop:12}} onClick={()=>setPage('etudes')}>→ Commencer une étude</button>
        </div>
      ) : (
        studies.slice(0,4).map((s,i)=>(
          <div key={i} className="hist-item" onClick={()=>setPage('historique')}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
              <div>
                <div className="serif" style={{fontSize:17,fontWeight:700,color:'var(--gold-lt)'}}> ✝ {s.reference}</div>
                <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{(s.ideeGenerale||'').slice(0,80)}…</div>
              </div>
              <div style={{fontSize:11,color:'#4A5568',whiteSpace:'nowrap'}}>{new Date(s.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</div>
            </div>
          </div>
        ))
      )}

      <div style={{marginTop:20,background:'rgba(212,168,67,.06)',border:'1px solid rgba(212,168,67,.2)',borderLeft:'3px solid var(--gold)',borderRadius:12,padding:18}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:'1.2px',textTransform:'uppercase',color:'var(--gold)',marginBottom:8}}>✝ Verset du jour</div>
        <div className="serif" style={{fontSize:17,fontStyle:'italic',color:'var(--text)',lineHeight:1.75,marginBottom:8}}>
          "Car je connais les projets que j'ai formés sur vous, dit l'Éternel, projets de paix et non de malheur, afin de vous donner un avenir et de l'espérance."
        </div>
        <div style={{fontSize:12,color:'var(--muted)'}}>Jérémie 29:11</div>
      </div>
    </div>
  )
}

// ══════════════════════════════════════════
// ÉTUDES BIBLIQUES
// ══════════════════════════════════════════
function Etudes({ profile }) {
  const [ref2, setRef2] = useState('')
  const [langue, setLangue] = useState('fr')
  const [loading, setLoading] = useState(false)
  const [error, setError] = useState('')
  const [result, setResult] = useState(null)
  const [activeSection, setActiveSection] = useState(null)

  async function analyser() {
    if(!ref2.trim()){setError('Entrez une référence biblique');return}
    setError('');setLoading(true);setResult(null);setActiveSection(null)
    const langLabel = langue==='fr'?'français':'créole haïtien'

    const prompt = `Tu es un théologien pentecôtiste évangélique expert en exégèse et herméneutique biblique.
Analyse le passage biblique : "${ref2}"
Réponds en ${langLabel}, uniquement en JSON valide sans markdown ni balise.
Structure JSON :
{
  "reference":"référence normalisée",
  "texte":"texte complet (Louis Segond ou NEG)",
  "auteur":"auteur du livre",
  "dateRedaction":"période de rédaction",
  "destinataires":"destinataires originaux",
  "ideeGenerale":"message central en une phrase",
  "contexteHistorique":"contexte historique et culturel détaillé",
  "contexteLitteraire":"genre littéraire, structure, place du passage",
  "analyseExegetique":{"structure":"structure du passage","motsCles":["mot1","mot2","mot3"],"sensOriginal":"sens dans la langue originale","intentionAuteur":"intention de l'auteur"},
  "analyseHermeneutique":"principes d'interprétation et application",
  "analyseTheologique":{"dieu":"ce que révèle Dieu","christ":"liens christologiques","salut":"aspects sotériologiques","saintEsprit":"rôle du Saint-Esprit","eglise":"implications ecclésiologiques"},
  "analysePentecotiste":{"baptemeSaintEsprit":"enseignements","donsSpirituels":"dons mentionnés","sanctification":"vie sainte","revival":"lien avec le réveil","mission":"implications missionnaires"},
  "applicationPratique":{"viePersonnelle":"application personnelle","vieFamiliale":"application familiale","vieMinisterielle":"application ministérielle","vieMissionnaire":"application missionnaire"},
  "referencesCroisees":["Réf1 — description","Réf2 — description","Réf3 — description"],
  "questionsReflexion":["Question 1?","Question 2?","Question 3?"],
  "planEnseignement":{"titre":"titre du message","introduction":"introduction engageante","points":["Point 1","Point 2","Point 3"],"conclusion":"conclusion et appel"}
}`

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})
      })
      if(!resp.ok) throw new Error(`Erreur API ${resp.status}`)
      const data = await resp.json()
      const raw = data.content.map(c=>c.text||'').join('')
      let parsed
      try { parsed = JSON.parse(raw.replace(/```json|```/g,'').trim()) }
      catch(e) { throw new Error('Réponse invalide, réessayez') }

      const study = {...parsed, langue, createdAt:new Date().toISOString()}
      setResult(study)
      setActiveSection('texte')

      if(profile?.uid) {
        const fb = await waitFB()
        await fb.push(fb.ref(fb.db, `studies/${profile.uid}`), study)
      }
    } catch(e) { setError(e.message||'Erreur de connexion') }
    finally { setLoading(false) }
  }

  function renderVal(key, val) {
    if(!val) return <div style={{color:'var(--muted)',fontStyle:'italic'}}>Non disponible</div>
    if(typeof val==='string') return <div className="body-text">{val}</div>
    if(Array.isArray(val)) return (
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {val.map((item,i)=>(
          <div key={i} style={{padding:'10px 14px',background:'rgba(255,255,255,.03)',borderRadius:6,borderLeft:'2px solid var(--gold)',fontSize:14,color:'#C8C0B0',lineHeight:1.6}}>
            {key==='questionsReflexion'?`${i+1}. `:''}{ item}
          </div>
        ))}
      </div>
    )
    if(typeof val==='object') return (
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {Object.entries(val).map(([k,v])=>(
          <div key={k} className="sub-section">
            <div className="sub-label">{k.replace(/([A-Z])/g,' $1').trim()}</div>
            {Array.isArray(v)
              ? <div className="pill-row">{v.map((x,i)=><span key={i} className="tag" style={{background:'rgba(212,168,67,.1)',borderColor:'rgba(212,168,67,.2)',color:'var(--gold)'}}>{x}</span>)}</div>
              : <div className="body-text">{v}</div>}
          </div>
        ))}
      </div>
    )
    return null
  }

  const activeCfg = SECTIONS.find(s=>s.key===activeSection)

  return (
    <div className="page fade">
      <div style={{marginBottom:20}}>
        <h1 className="serif" style={{fontSize:26,fontWeight:700,color:'var(--gold-lt)',marginBottom:4}}>📖 Études Bibliques</h1>
        <p style={{fontSize:13,color:'var(--muted)'}}>Analyse complète pentecôtiste assistée par IA</p>
      </div>

      <div className="card" style={{marginBottom:20}}>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:error?12:0}}>
          <input className="input" style={{flex:1,minWidth:180,fontFamily:'Cormorant Garamond,serif',fontSize:16}}
            placeholder="Ex: Jean 3:16 ou Romains 8:28-30"
            value={ref2} onChange={e=>setRef2(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&analyser()}/>
          <select className="input" style={{width:'auto',cursor:'pointer'}} value={langue} onChange={e=>setLangue(e.target.value)}>
            <option value="fr">🇫🇷 Français</option>
            <option value="ht">🇭🇹 Kreyòl</option>
          </select>
          <button className="btn btn-gold" onClick={analyser} disabled={loading} style={{whiteSpace:'nowrap'}}>
            {loading?<><div className="spin" style={{borderTopColor:'#0E1117'}}/>Analyse...</>:'⚡ Analyser'}
          </button>
        </div>
        {error && <div className="error-box" style={{marginTop:10,marginBottom:0}}>⚠ {error}</div>}
      </div>

      {result && (
        <div className="fade">
          {/* Header */}
          <div className="card card-accent" style={{marginBottom:14}}>
            <div className="serif" style={{fontSize:24,fontWeight:700,color:'var(--gold-lt)',marginBottom:6}}>✝ {result.reference}</div>
            <div style={{fontSize:13,color:'#C8C0B0',fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>{result.ideeGenerale}</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:16}}>
              {[{l:'Auteur',v:result.auteur},{l:'Date',v:result.dateRedaction},{l:'Destinataires',v:result.destinataires}].map((m,i)=>(
                <div key={i}>
                  <span style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.8px'}}>{m.l}: </span>
                  <span style={{fontSize:12,color:'var(--gold)',fontWeight:500}}>{m.v}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Pills */}
          <div className="pill-row">
            {SECTIONS.map(s=>(
              <button key={s.key} className="pill" onClick={()=>setActiveSection(s.key)}
                style={{borderColor:activeSection===s.key?s.color:'var(--border)',background:activeSection===s.key?`${s.color}22`:'var(--card)',color:activeSection===s.key?s.color:'var(--muted)',fontWeight:activeSection===s.key?600:400}}>
                {s.icon} {s.label}
              </button>
            ))}
          </div>

          {/* Content */}
          {activeSection && activeCfg && (
            <div className="section-content fade" style={{borderTop:`3px solid ${activeCfg.color}`}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                <span style={{fontSize:20}}>{activeCfg.icon}</span>
                <h2 className="serif" style={{fontSize:19,fontWeight:700,color:'var(--gold-lt)'}}>{activeCfg.label}</h2>
              </div>
              {renderVal(activeSection, result[activeSection])}
            </div>
          )}
        </div>
      )}
    </div>
  )
}

// ══════════════════════════════════════════
// HISTORIQUE
// ══════════════════════════════════════════
function Historique({ profile }) {
  const [studies, setStudies] = useState([])
  const [loading, setLoading] = useState(true)
  const [search, setSearch] = useState('')
  const [expanded, setExpanded] = useState(null)

  useEffect(()=>{
    if(!profile?.uid){setLoading(false);return}
    waitFB().then(fb=>{
      fb.get(fb.ref(fb.db, `studies/${profile.uid}`)).then(snap=>{
        if(snap.exists()){
          const all = Object.entries(snap.val()).map(([id,v])=>({id,...v}))
          all.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))
          setStudies(all)
        }
        setLoading(false)
      }).catch(()=>setLoading(false))
    })
  },[profile])

  const filtered = studies.filter(s=>
    (s.reference||'').toLowerCase().includes(search.toLowerCase())||
    (s.ideeGenerale||'').toLowerCase().includes(search.toLowerCase())
  )

  return (
    <div className="page fade">
      <div style={{marginBottom:20}}>
        <h1 className="serif" style={{fontSize:26,fontWeight:700,color:'var(--gold-lt)',marginBottom:4}}>🕐 Historique</h1>
        <p style={{fontSize:13,color:'var(--muted)'}}>Toutes vos études bibliques — {studies.length} au total</p>
      </div>

      <input className="input" style={{marginBottom:16}} placeholder="Rechercher une référence…"
        value={search} onChange={e=>setSearch(e.target.value)}/>

      {loading ? (
        <div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spin" style={{width:28,height:28}}/></div>
      ) : filtered.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:'40px 20px',color:'var(--muted)'}}>
          <div style={{fontSize:36,marginBottom:12}}>📭</div>
          <div>Aucune étude trouvée</div>
        </div>
      ) : filtered.map(s=>(
        <div key={s.id} className="hist-item" onClick={()=>setExpanded(expanded===s.id?null:s.id)}
          style={{borderColor:expanded===s.id?'var(--gold)':'var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
            <div>
              <div className="serif" style={{fontSize:18,fontWeight:700,color:'var(--gold-lt)',marginBottom:4}}>✝ {s.reference}</div>
              <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.5}}>{(s.ideeGenerale||'').slice(0,100)}{(s.ideeGenerale||'').length>100?'…':''}</div>
            </div>
            <div style={{fontSize:11,color:'#4A5568',whiteSpace:'nowrap'}}>{new Date(s.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}</div>
          </div>
          {expanded===s.id && (
            <div className="fade" style={{marginTop:14,borderTop:'1px solid var(--border)',paddingTop:14}}>
              {s.texte && <div className="quote" style={{marginBottom:14}}>{s.texte}</div>}
              {s.applicationPratique?.viePersonnelle && (
                <div>
                  <div style={{fontSize:10,fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',color:'#4A8A5A',marginBottom:6}}>🌱 Application personnelle</div>
                  <div className="body-text">{s.applicationPratique.viePersonnelle}</div>
                </div>
              )}
              {s.planEnseignement?.titre && (
                <div style={{marginTop:12,background:'var(--surface)',borderRadius:8,padding:12,fontSize:13,color:'#C8C0B0'}}>
                  <span style={{color:'var(--gold)',fontWeight:600}}>Plan: </span>{s.planEnseignement.titre}
                </div>
              )}
            </div>
          )}
        </div>
      ))}
    </div>
  )
}

// COMING SOON

    <div className="page fade">
      <h1 className="serif" style={{fontSize:26,fontWeight:700,color:'var(--gold-lt)',marginBottom:4}}>{icon} {title}</h1>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:28}}>{desc}</p>
      <div className="card" style={{textAlign:'center',padding:'48px 24px',borderTop:`3px solid ${color}`}}>
        <div style={{fontSize:48,marginBottom:16}}>{icon}</div>

        <div style={{fontSize:14,color:'var(--muted)',maxWidth:360,margin:'0 auto',lineHeight:1.7}}>
          Ce module sera disponible dans la prochaine version de Salem DBS.
        </div>
        <div style={{display:'inline-block',marginTop:18,padding:'7px 18px',borderRadius:20,background:`${color}22`,border:`1px solid ${color}44`,fontSize:12,color,fontWeight:600}}>

        </div>
      </div>

}

// ══════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════
function App() {
  const [user, setUser] = useState(null)
  const [profile, setProfile] = useState(null)
  const [authReady, setAuthReady] = useState(false)
  const [page, setPage] = useState('dashboard')
  const [sidebarOpen, setSidebarOpen] = useState(false)

  useEffect(()=>{
    waitFB().then(fb=>{
      fb.onAuthStateChanged(fb.auth, async u=>{
        if(u){
          setUser(u)
          const snap = await fb.get(fb.ref(fb.db, `users/${u.uid}`))
          setProfile(snap.exists()?snap.val():{ uid:u.uid, firstName:u.displayName?.split(' ')[0]||'', lastName:u.displayName?.split(' ')[1]||'', role:'USER' })
        } else { setUser(null); setProfile(null) }
        setAuthReady(true)
      })
    })
  },[])

  async function handleLogin(u, p) { setUser(u); setProfile(p||{uid:u.uid,firstName:u.displayName?.split(' ')[0]||'',role:'USER'}); setPage('dashboard') }
  async function handleLogout() {
    const fb = await waitFB()
    await fb.signOut(fb.auth)
    setUser(null); setProfile(null)
  }

  if(!authReady) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:36,marginBottom:16}}>✝</div>
        <div className="spin" style={{width:28,height:28,margin:'0 auto'}}/>
      </div>
    </div>
  )

  if(!user) return <LoginPage onLogin={handleLogin}/>

  const pages = {
    dashboard:  <Dashboard profile={profile} setPage={setPage}/>,
    etudes:     <Etudes profile={profile}/>,
    historique: <Historique profile={profile}/>,
    pastoral:   <ComingSoon title="Module Pastoral" icon="🎙" desc="Génération de sermons, formations et plans d'évangélisation" color="#7A4A9A"/>,
    formation:  <ComingSoon title="Formation" icon="🎓" desc="Parcours disciples: Nouveaux convertis, Discipulat, Leadership, Ministère" color="#4A7FA5"/>,
    profil:     <ComingSoon title="Mon Profil" icon="👤" desc="Données personnelles, ecclésiastiques et théologiques" color="#4A8A5A"/>,
    eglises:    <ComingSoon title="Gestion des Églises" icon="⛪" desc="Inscription et administration des congrégations" color="#D4A843"/>,
    membres:    <ComingSoon title="Gestion des Membres" icon="👥" desc="Registre complet des membres" color="#A07A3A"/>,
  }

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} profile={profile} onLogout={handleLogout} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        <header className="mob-header">
          <div className="serif" style={{fontSize:18,fontWeight:700,color:'var(--gold-lt)'}}>✝ Salem DBS</div>
          <button onClick={()=>setSidebarOpen(o=>!o)} style={{background:'none',border:'none',color:'var(--text)',fontSize:22,cursor:'pointer',padding:4}}>☰</button>
        </header>
        <main style={{flex:1,overflow:'auto',background:'var(--bg)'}}>
          {pages[page]||pages.dashboard}
        </main>
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
